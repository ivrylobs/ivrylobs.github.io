<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Lab8 Problem 4</title>
		<style>
			#cat {
				position: absolute;
				left: 0px;
			}
		</style>
	</head>
	<body>
		<div>
			<!-- Cat walking GIF from: http://www.anniemation.com/clip_art/graphics.html -->
			<img
				id="cat"
				src="https://www.kasandbox.org/programming-images/misc/cat-walk.gif"
			/>
		</div>

		<script>
            var catEl = document.getElementById("cat");
            var walkDistance = 0
            function catWalk() {
                walkDistance += 10
                if (walkDistance >= window.innerWidth) {
                    walkDistance = -catEl.width
                }
                catEl.style.left = walkDistance + "px"
            }
            window.setInterval(catWalk, 125)
		</script>
	</body>
</html>
