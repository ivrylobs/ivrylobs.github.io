<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Simple DOM example</title>
	</head>
	<body>
		<section>
			<img
				src="dinosaur.png"
				alt="A red Tyrannosaurus Rex: A two legged dinosaur standing upright like a human, with small arms, and a large head with lots of sharp teeth."
			/>
			<p>
				Here we will add a link to the
				<a href="https://www.mozilla.org/">Mozilla homepage</a>
			</p>
		</section>

		<script>
			var pDom = document.querySelector("p");
			var imgDom = document.querySelector("img");

			//Set paragraph style.
			pDom.textContent = "We hope you enjoy learning";
            pDom.style.width = "500px"
            pDom.style.textAlign = "center"
            pDom.style.backgroundColor = "black"
            pDom.style.color = "white"
            pDom.style.height = "50px"
            pDom.style.verticalAlign = "middle"
            pDom.style.display = "table-cell"

			//Set img style and add eventlistener.
			imgDom.src = "./images/en-kku.jpg";
            imgDom.style.width = "500px"
            imgDom.addEventListener("click", function () {
                window.open("https://www.en.kku.ac.th/web/")
            })
            
		</script>
	</body>
</html>
