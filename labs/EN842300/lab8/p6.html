<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Lab8 Problem 6</title>

		<style>
			div {
				background-color: red;
				width: 250px;
				height: 250px;
				animation-name: changeColorAnimate;
				animation-delay: -1s;
				animation-duration: 5s;
				animation-iteration-count: infinite;
			}

			@keyframes changeColorAnimate {
				0% {background-color: red; margin-left: 0px;}
				100% {background-color: yellow; margin-left: 200px;}
			}
		</style>
	</head>
	<body>
		<div></div>

		
	</body>
</html>
