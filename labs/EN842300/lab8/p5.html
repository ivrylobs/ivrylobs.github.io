<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab8 Problem 5</title>

    <style>
        div {
            background-color: red;
            width: 250px;
            height: 250px;
            animation-name: changeColorAnimate;
            animation-duration: 2s;
            animation-delay: 2s;
            animation-iteration-count: infinite;
        }

        @keyframes changeColorAnimate {
           from {
               background-color: red;
           }
           to {
               background-color: blue;
           }
        }
    </style>
</head>
<body>
    <div></div>

   
</body>
</html>
