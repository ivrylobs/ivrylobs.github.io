<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />
		<title>Problem 3</title>

		<style>
			div.textSection {
				display: flex;
				align-items: center;
			}
			div.radioButtonSection {
				display: flex;
				align-items: center;
			}
			input {
				margin-left: 10px;
				height: 30px;
			}

			button {
				color: #f4f4f4;
				background: #1abc9c;
				font-weight: bold;
				margin-left: 5px;
				margin-top: 10px;
				font-family: Arial, sans-serif;
				border-radius: 4px;
				border: solid 0 #e3edf4;
				border-bottom: 2px solid #3a9a95;
				-moz-border-radius: 4px;
				-webkit-border-radius: 4px;
				border-radius: 4px;
				padding: 10px 25px 10px 25px;
				margin-bottom: 10px;
			}

			p {
				visibility: hidden;
				background-color: coral;
				padding-left: 10px;
				padding-right: 10px;
				height: 50px;
				display: table-cell;
				vertical-align: middle;
			}
		</style>
	</head>
	<body>
		<div class="textSection">
			<h2>Enter student name:</h2>
			<input type="text" name="nameInput" id="textInput" />
		</div>
		<div class="radioButtonSection">
			<label for="radioButton">English</label>
			<input
				id="engRadio"
				type="radio"
				name="languageCheck"
				value="eng"
				checked
			/>

			<label for="radioButton">ไทย</label>
			<input
				id="thaiRadio"
				type="radio"
				name="languageCheck"
				value="thai"
			/>
		</div>
		<button id="generatorButton">
			Generate random words</button
		><br />

		<p id="nameDisplay">asdfasdf</p>

		<script>
			let generateButton = document.getElementById("generatorButton");
			let nameText = document.getElementById("textInput");
			let engChecker = document.getElementById("engRadio");
			let thaiChecker = document.getElementById("thaiRadio");
			let textDisplay = document.getElementById("nameDisplay");

			let engList = [
				"ate dinner.",
				"had a three-course meal.",
				" came to dinner with us.",
				"loves fish tacos."
			];
			let thaiList = [
				"ชอบเตียงในห้องนอน.",
				"ฉีกสมุดซึ่งวางอยู่ในห้อง.",
				"ถามคนที่นั่งอยู่บนเก้าอี้.",
				"เห็นนักเรียนคนหนึ่ง."
			];

			generateButton.onclick = function() {
				textDisplay.style.visibility = "visible";
				if (engChecker.checked) {
					textDisplay.innerHTML =
						nameText.value +
						" " +
						engList[Math.floor(Math.random() * engList.length)];
				} else if (thaiChecker.checked) {
					textDisplay.innerHTML =
						nameText.value +
						" " +
						thaiList[Math.floor(Math.random() * thaiList.length)];
				}
			};
		</script>
	</body>
</html>
