<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Lab8 Problem 3</title>
	</head>
	<body>
		<button style="background-color: greenyellow;">Start</button>
		<p id="stopwatch-display"></p>

		<script>
			var display = document.getElementById("stopwatch-display");
			var stopWatchBtn = document.querySelector("button");
			var timeCount = 0;
			var myStopWatch = null

			stopWatchBtn.addEventListener("click", function(event) {
				if (event.target.textContent == "Start") {
					event.target.textContent = "Stop"
					event.target.style.backgroundColor = "Red"
					myStopWatch = window.setInterval(timer, 1000)
				} else {
					event.target.textContent = "Start"
					event.target.style.backgroundColor = "greenyellow"
					window.clearInterval(myStopWatch)
				}
            });

			function timer() {
				timeCount += 1;
				display.textContent = timeCount + " seconds you have gone by";
			}

			display.textContent = "0 seconds you have gone by";
		</script>
	</body>
</html>
