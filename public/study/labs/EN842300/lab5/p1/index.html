<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />
		<title>Problem 1</title>
		<style>
			button {
				color: #f4f4f4;
				background: #1abc9c;
				font-weight: bold;
				margin-left: 5px;
				margin-top: 10px;
				font-family: Arial, sans-serif;
				border-radius: 4px;
				border: solid 0 #e3edf4;
				border-bottom: 2px solid #3a9a95;
				-moz-border-radius: 4px;
				-webkit-border-radius: 4px;
				border-radius: 4px;
				padding: 10px 25px 10px 25px;
			}
		</style>
	</head>
	<body>
		<button id="countingButton">Click me</button>
		<p id="textOutput"></p>
		<script>
			let clickMeButton = document.getElementById("countingButton");
			let paragraphOutput = document.getElementById("textOutput");
			var count = 0;

			clickMeButton.onclick = function() {
				if (count == 0) {
					count++;
					paragraphOutput.innerHTML =
						"You clicked the button for " + count + " time.";
				} else {
					count++;
					paragraphOutput.innerHTML =
						"You clicked the button for " + count + " times.";
				}
			};
		</script>
	</body>
</html>
