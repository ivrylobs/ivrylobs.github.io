<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />
		<title>Document</title>
	</head>
	<body>
		<h3>Click the button to display the date.</h3>
		<button id="getTimeButton">The time is?</button>
		<p id="demo"></p>

		<script>
			let date = new Date();
			let getTimeButton = document.getElementById("getTimeButton");
			let displayParagraph = document.getElementById("demo");

			getTimeButton.onclick = function() {
				displayParagraph.innerHTML = date.toString();
			};
		</script>
	</body>
</html>
