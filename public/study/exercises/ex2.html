<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />
		<title>Document</title>
	</head>

	<body>
		<p id="demo">Display the result here.</p>
		<script>
			var person = {
				firstName: "Manee",
				lastName: "Doe"
			};

			let displayParagraph = document.getElementById("demo");
			person["country"] = "Thailand";
			displayParagraph.innerHTML =
				displayParagraph.innerHTML +
				"<br> Firstname is " +
				person.firstName +
				" is in " +
				person.country;
		</script>
	</body>
</html>
