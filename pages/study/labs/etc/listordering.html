<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./styles/listorderingstyle.css">
    <title>Document</title>
</head>
<body>
    <div class="unordered"> 
        <p>This is an unordered list:</p>
    </div>
    <ul class="unordered">
        <li>Coffee</li>
        <li>Tea</li>
        <li>Coca Cola</li>
    </ul>

    <div class="ordered">
        <p>This is an ordered list:</p>
    </div>
    <ol class="ordered">
        <li>Coffee</li>
        <li>Tea</li>
        <li>Coca Cola</li>
    </ol>
</body>
</html>
