<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<button id="jsonButton">Download JSON</button>

		<script>
            var jsonButton = document.getElementById("jsonButton");
            
			//Create tool needed for download JSON file from localhost.
			var jsonLocation =
				"./example.json";
			var request = new XMLHttpRequest();

            //Downloading
			request.open("GET", jsonLocation);
			request.responseType = "json";
			request.send();

            request.onload = function() {

				var loadedObject = request.response["tutorials"]
				
                for(var i = 0; i < loadedObject.length; i++) {

                    var header = loadedObject[i].display
                    var link = loadedObject[i].url

					document.write('<a target="blank" href="' + link + '">' + header + '</a><br>')
					

                }
            }

		</script>
	</body>
</html>
